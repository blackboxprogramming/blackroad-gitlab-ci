name: Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  deployments: write

jobs:
  detect-service:
    name: Detect Service Type
    runs-on: ubuntu-latest
    outputs:
      service_type: ${{ steps.detect.outputs.service_type }}
      deploy_target: ${{ steps.detect.outputs.deploy_target }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect Service Type
        id: detect
        run: |
          if [ -f "next.config.mjs" ] || [ -f "next.config.js" ] || [ -f "next.config.ts" ]; then
            echo "service_type=nextjs" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          elif [ -f "wrangler.toml" ] || [ -f "wrangler.jsonc" ]; then
            echo "service_type=worker" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare-worker" >> $GITHUB_OUTPUT
          elif [ -f "Dockerfile" ]; then
            echo "service_type=docker" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "service_type=node" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "service_type=python" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          else
            echo "service_type=static" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          fi
          echo "Detected: service_type=$(cat $GITHUB_OUTPUT | grep service_type | cut -d= -f2)"

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: detect-service
    if: needs.detect-service.outputs.deploy_target == 'cloudflare'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --ignore-scripts=false

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=${{ github.event.repository.name }} --commit-hash=${{ github.sha }}

  deploy-cloudflare-worker:
    name: Deploy Cloudflare Worker
    needs: detect-service
    if: needs.detect-service.outputs.deploy_target == 'cloudflare-worker'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  deploy-railway:
    name: Deploy to Railway
    needs: detect-service
    if: needs.detect-service.outputs.deploy_target == 'railway'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Health Check
    needs: [deploy-cloudflare, deploy-cloudflare-worker, deploy-railway]
    if: |
      always() && (
        needs.deploy-cloudflare.result == 'success' ||
        needs.deploy-cloudflare-worker.result == 'success' ||
        needs.deploy-railway.result == 'success'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Deployment Propagation
        run: sleep 30

      - name: Check Health Endpoint
        run: |
          URL="${{ secrets.DEPLOY_URL }}/api/health"
          echo "Checking: $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

      - name: Notify Success
        if: success()
        run: echo "Deployment successful and healthy"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment health check failed"
          exit 1
