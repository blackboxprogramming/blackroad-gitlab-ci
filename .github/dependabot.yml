version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    reviewers:
      - "blackboxprogramming"
    labels:
      - "dependencies"
      - "automated"
      - "automerge"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      production-deps:
        dependency-type: "production"
      dev-deps:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    reviewers:
      - "blackboxprogramming"
    labels:
      - "dependencies"
      - "github-actions"
      - "automerge"
    commit-message:
      prefix: "ci"

  # pip dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    reviewers:
      - "blackboxprogramming"
    labels:
      - "dependencies"
      - "python"
      - "automerge"
    commit-message:
      prefix: "chore"
